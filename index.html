                .cover .meta { font-size:0.85rem; opacity:0.75; margin-bottom:1.25rem; }
                .stats { display:flex; gap:2rem; flex-wrap:wrap; }
                .stat { }
                .stat-val { font-family:monospace; font-size:1.6rem; font-weight:700; }
                .stat-label { font-size:0.7rem; opacity:0.7; text-transform:uppercase; letter-spacing:.05em; }
                .section { margin-bottom:2rem; }
                .section h2 { font-size:1rem; font-weight:700; color:#2F6F4E; border-bottom:2px solid #E6F2EC; padding-bottom:0.5rem; margin-bottom:1rem; }
                table { width:100%; border-collapse:collapse; font-size:0.88rem; }
                th { background:#2F6F4E; color:white; padding:0.6rem 0.75rem; text-align:left; font-weight:600; }
                td { padding:0.55rem 0.75rem; border-bottom:1px solid #E6F2EC; vertical-align:top; }
                .budget-bar { height:8px; background:#E6F2EC; border-radius:4px; margin-top:1rem; overflow:hidden; }
                .budget-fill { height:100%; border-radius:4px; background:${underBudget?'#4caf50':'#f44336'}; width:${Math.min(100,(totalSEK/(trip.budget||1))*100).toFixed(0)}%; }
                .footer { margin-top:3rem; padding-top:1rem; border-top:1px solid #C8DDD3; text-align:center; font-size:0.75rem; color:#888; }
                @media print { body { padding:20px; } .no-print { display:none; } }
            </style>
        </head><body>
            <div class="cover">
                <div style="font-size:2.5rem;margin-bottom:0.5rem">${flag}</div>
                <h1>${trip.name}</h1>
                <div class="meta">
                    ${expenses.length} utgifter
                    ${trip.start_date ? ' · ' + new Date(trip.start_date).toLocaleDateString('sv-SE') : ''}
                    ${trip.end_date ? ' – ' + new Date(trip.end_date).toLocaleDateString('sv-SE') : ''}
                    · Exporterad ${new Date().toLocaleDateString('sv-SE')}
                </div>
                <div class="stats">
                    <div class="stat"><div class="stat-val">${totalSEK.toFixed(0)} kr</div><div class="stat-label">Totalt spenderat</div></div>
                    ${hasBudget ? `<div class="stat"><div class="stat-val" style="color:${underBudget?'#a5d6a7':'#ef9a9a'}">${(trip.budget - totalSEK).toFixed(0)} kr</div><div class="stat-label">${underBudget?'Under budget':'Över budget'}</div></div>` : ''}
                </div>
                ${hasBudget ? `<div class="budget-bar"><div class="budget-fill"></div></div>` : ''}
            </div>

            <div class="section">
                <h2>Per kategori</h2>
                <table><thead><tr><th>Kategori</th><th style="text-align:right">Belopp</th><th style="text-align:right">Andel</th></tr></thead>
                <tbody>${catRows}</tbody></table>
            </div>

            <div class="section">
                <h2>Alla utgifter</h2>
                <table><thead><tr><th>Datum</th><th>Beskrivning</th><th>Kategori</th><th style="text-align:right">Original</th><th style="text-align:right">SEK</th></tr></thead>
                <tbody>${expRows}</tbody>
                <tfoot><tr style="background:#2F6F4E;color:white"><td colspan="4" style="font-weight:700;padding:0.6rem 0.75rem">TOTALT</td><td style="text-align:right;font-family:monospace;font-weight:700;padding:0.6rem 0.75rem">${totalSEK.toFixed(0)} kr</td></tr></tfoot>
                </table>
            </div>

            <div class="footer">Våra resor · Exporterad ${new Date().toLocaleString('sv-SE')}</div>

            <script>setTimeout(() => { window.print(); }, 400);<\/script>
        </body></html>`);
        printWin.document.close();
    };

    return (
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:'420px'}}>
                <div className="modal-header">
                    <span className="modal-title">📤 Exportera — {trip.name}</span>
                    <button className="close-btn" onClick={onClose}>×</button>
                </div>
                <p style={{fontSize:'0.88rem', color:'var(--text-muted)', marginBottom:'1.25rem'}}>
                    {expenses.length} utgifter · {expenses.reduce((s,e) => s + e.amount * e.exchange_rate, 0).toFixed(0)} kr totalt
                </p>
                <div style={{display:'flex', flexDirection:'column', gap:'0.75rem'}}>
                    <button className="btn btn-primary" style={{justifyContent:'center', fontSize:'1rem', padding:'0.9rem'}} onClick={exportPDF}>
                        🖨️ Exportera som PDF
                        <span style={{fontSize:'0.75rem', opacity:0.75, fontWeight:400, marginLeft:'0.3rem'}}>— snygg rapport som öppnas i nytt fönster</span>
                    </button>
                    <button className="btn btn-secondary" style={{justifyContent:'center', fontSize:'1rem', padding:'0.9rem'}} onClick={exportCSV}>
                        📊 Ladda ner CSV
                        <span style={{fontSize:'0.75rem', opacity:0.75, fontWeight:400, marginLeft:'0.3rem'}}>— öppna i Excel eller Google Sheets</span>
                    </button>
                </div>
                <button className="btn btn-secondary" style={{width:'100%', justifyContent:'center', marginTop:'1rem'}} onClick={onClose}>Avbryt</button>
            </div>
        </div>
    );
}

// ── HELPERS ───────────────────────────────────────────────
function makeDestination() {
    return { id: Date.now() + Math.random(), name: '', dateFrom: '', dateTo: '', mapQuery: '', sights: [] };
}
function makeSight() {
    return { id: Date.now() + Math.random(), name: '', link: '', mapQuery: '', note: '' };
}

// Converts a Google Maps search query to an embed URL
function mapEmbedUrl(query) {
    if (!query.trim()) return null;
    return `https://maps.google.com/maps?q=${encodeURIComponent(query)}&output=embed`;
}
function mapDirectUrl(query) {
    return `https://www.google.com/maps/search/${encodeURIComponent(query)}`;
}

// ── RESAPLANERARE PANEL ───────────────────────────────────
function TripPlannerPanel({ trip, onSave, onClose, onActivate, onDelete }) {
    const [name, setName] = useState(trip.name || '');
    const [budget, setBudget] = useState(trip.budget ? String(trip.budget) : '');
    const [destinations, setDestinations] = useState(() => {
        try { return trip.plan_data ? JSON.parse(trip.plan_data) : [makeDestination()]; } catch { return [makeDestination()]; }
    });
    const [saving, setSaving] = useState(false);
    const [confirm, setConfirm] = useState(null);

    const updateDest = (idx, field, val) => {
        setDestinations(ds => ds.map((d, i) => i === idx ? { ...d, [field]: val } : d));
    };
    const updateSight = (dIdx, sIdx, field, val) => {
        setDestinations(ds => ds.map((d, i) => i !== dIdx ? d : {
            ...d, sights: d.sights.map((s, j) => j === sIdx ? { ...s, [field]: val } : s)
        }));
    };
    const addDest = () => setDestinations(ds => [...ds, makeDestination()]);
    const removeDest = (idx) => setDestinations(ds => ds.filter((_, i) => i !== idx));
    const addSight = (dIdx) => setDestinations(ds => ds.map((d, i) => i !== dIdx ? d : { ...d, sights: [...d.sights, makeSight()] }));
    const removeSight = (dIdx, sIdx) => setDestinations(ds => ds.map((d, i) => i !== dIdx ? d : { ...d, sights: d.sights.filter((_, j) => j !== sIdx) }));

    const handleSave = async () => {
        setSaving(true);
        await onSave(trip.id, {
            name: name.trim() || trip.name,
            budget: budget ? parseFloat(budget) : null,
            plan_data: JSON.stringify(destinations)
        });
        setSaving(false);
    };

    // Track which dest sections are collapsed — all collapsed by default
    const [collapsed, setCollapsed] = useState(() => {
        const init = {};
        try {
            const ds = trip.plan_data ? JSON.parse(trip.plan_data) : [];
            ds.forEach((_, i) => { init[i] = true; });
        } catch {}
        return init;
    });
    const toggleCollapse = (idx) => setCollapsed(c => ({ ...c, [idx]: !c[idx] }));

    // Track which sights are collapsed — collapsed by default
    const [collapsedSights, setCollapsedSights] = useState({});
    const toggleSight = (dIdx, sIdx) => setCollapsedSights(c => ({
        ...c, [`${dIdx}-${sIdx}`]: !c[`${dIdx}-${sIdx}`]
    }));
    // When a new sight is added, expand it automatically
    const addSightExpanded = (dIdx) => {
        const newSights = destinations[dIdx]?.sights || [];
        const newIdx = newSights.length; // index of the about-to-be-added sight
        addSight(dIdx);
        setTimeout(() => setCollapsedSights(c => ({ ...c, [`${dIdx}-${newIdx}`]: false })), 0);
    };

    const totalNights = destinations.reduce((sum, d) => {
        if (d.dateFrom && d.dateTo && new Date(d.dateTo) > new Date(d.dateFrom))
            return sum + Math.round((new Date(d.dateTo) - new Date(d.dateFrom)) / 86400000);
        return sum;
    }, 0);

    return (
        <div className="planning-panel-overlay" onClick={onClose}>
            {confirm && (
                <ConfirmDialog
                    title="Ta bort planerad resa?"
                    message={`"${trip.name}" raderas permanent.`}
                    onConfirm={() => { onDelete(trip.id); onClose(); setConfirm(null); }}
                    onCancel={() => setConfirm(null)}
                />
            )}
            <div className="planning-panel" onClick={e => e.stopPropagation()}>

                {/* ── LEVEL 1: RESA (mörk header) ── */}
                <div className="planning-panel-header">
                    <div style={{flex:1, minWidth:0}}>
                        <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.1em', opacity:0.6, textTransform:'uppercase', marginBottom:'0.35rem'}}>RESA</div>
                        <input
                            className="editable-title-input"
                            value={name}
                            onChange={e => setName(e.target.value)}
                            placeholder="Resans namn..."
                            style={{fontSize:'1.25rem'}}
                        />
                        <div style={{display:'flex', gap:'1.25rem', marginTop:'0.6rem', flexWrap:'wrap', alignItems:'center'}}>
                            <div style={{display:'flex', alignItems:'center', gap:'0.5rem', fontSize:'0.82rem', opacity:0.85}}>
                                <span>💰 Budget:</span>
                                <input
                                    className="budget-inline-input"
                                    type="number" min="0" step="1"
                                    placeholder="valfritt"
                                    value={budget}
                                    onChange={e => setBudget(e.target.value)}
                                    style={{width:'100px'}}
                                />
                                <span>kr</span>
                            </div>
                            {destinations.length > 0 && (
                                <div style={{fontSize:'0.82rem', opacity:0.75}}>
                                    {destinations.length === 1
                                        ? (destinations[0].name || 'en destination')
                                        : `${destinations.filter(d => d.name).length} stopp`}
                                    {totalNights > 0 && ` · ${totalNights} nätter`}
                                </div>
                            )}
                        </div>
                    </div>
                    <div style={{display:'flex', flexDirection:'column', gap:'0.5rem', alignItems:'flex-end', flexShrink:0}}>
                        <button className="close-btn" style={{color:'white', background:'rgba(255,255,255,0.15)'}} onClick={onClose}>×</button>
                        <button className="btn btn-primary btn-small" onClick={() => { handleSave(); onActivate(trip.id); onClose(); }}>▶ Starta resa</button>
                    </div>
                </div>

                {/* ── BODY ── */}
                <div className="planning-panel-body">

                    {/* STOPP & PLANERING SECTION LABEL */}
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                        <div style={{display:'flex', alignItems:'center', gap:'0.6rem'}}>
                            <div style={{width:'3px', height:'20px', background:'var(--primary)', borderRadius:'2px'}} />
                            <span style={{fontWeight:700, fontSize:'0.95rem', color:'var(--text)'}}>Stopp & Planering</span>
                            <span style={{fontSize:'0.75rem', color:'var(--text-muted)', background:'var(--border)', borderRadius:'20px', padding:'0.1rem 0.6rem', fontWeight:600}}>
                                {destinations.length === 1 ? 'En destination' : `${destinations.length} stopp`}
                            </span>
                        </div>
                        <button className="add-link" onClick={addDest} style={{fontSize:'0.85rem'}}>+ Lägg till stopp</button>
                    </div>

                    {/* ── LEVEL 2: DESTINATIONER ── */}
                    <div style={{display:'flex', flexDirection:'column', gap:'1.25rem'}}>
                        {destinations.map((dest, dIdx) => (
                            <div key={dest.id} style={{
                                border:'2px solid var(--primary)',
                                borderRadius:'12px', overflow:'hidden',
                                boxShadow:'0 2px 8px rgba(47,111,78,0.08)'
                            }}>
                                {/* Destination header — teal accent */}
                                <div style={{
                                    background:'linear-gradient(135deg, #e8f5ee 0%, #d4eadd 100%)',
                                    padding:'0.85rem 1rem',
                                    display:'flex', alignItems:'center', gap:'0.75rem',
                                    borderBottom: collapsed[dIdx] ? 'none' : '1px solid var(--border)'
                                }}>
                                    <div style={{
                                        width:'28px', height:'28px', borderRadius:'50%',
                                        background:'var(--primary)', color:'white',
                                        display:'flex', alignItems:'center', justifyContent:'center',
                                        fontFamily:'Space Mono, monospace', fontWeight:700, fontSize:'0.8rem', flexShrink:0
                                    }}>{dIdx + 1}</div>
                                    <input
                                        className="dest-name-input"
                                        placeholder={destinations.length === 1 ? 'Stad / Destination...' : 'Stad / Stopp...'}
                                        value={dest.name}
                                        onChange={e => updateDest(dIdx, 'name', e.target.value)}
                                        style={{fontWeight:700, fontSize:'1rem', color:'var(--text)', background:'transparent', border:'none', borderBottom:'2px solid transparent', padding:'0.2rem 0'}}
                                        onFocus={e => e.target.style.borderBottomColor = 'var(--primary)'}
                                        onBlur={e => e.target.style.borderBottomColor = 'transparent'}
                                    />
                                    {/* Date pill */}
                                    {(dest.dateFrom || dest.dateTo) && (
                                        <div style={{fontSize:'0.75rem', color:'var(--text-muted)', background:'white', borderRadius:'20px', padding:'0.2rem 0.7rem', fontWeight:500, whiteSpace:'nowrap', flexShrink:0, border:'1px solid var(--border)'}}>
                                            {dest.dateFrom || '?'} → {dest.dateTo || '?'}
                                            {dest.dateFrom && dest.dateTo && new Date(dest.dateTo) > new Date(dest.dateFrom) &&
                                                ` (${Math.round((new Date(dest.dateTo) - new Date(dest.dateFrom)) / 86400000)} nätter)`
                                            }
                                        </div>
                                    )}
                                    <div style={{display:'flex', gap:'0.3rem', marginLeft:'auto', flexShrink:0}}>
                                        <button
                                            onClick={() => toggleCollapse(dIdx)}
                                            style={{background:'white', border:'1px solid var(--border)', borderRadius:'6px', cursor:'pointer', padding:'0.25rem 0.5rem', fontSize:'0.75rem', color:'var(--text-muted)', fontWeight:600}}
                                        >{collapsed[dIdx] ? '▼ Visa' : '▲ Dölj'}</button>
                                        {destinations.length > 1 && (
                                            <button className="sight-del-btn" onClick={() => removeDest(dIdx)} title="Ta bort destination" style={{background:'white'}}>✕</button>
                                        )}
                                    </div>
                                </div>

                                {!collapsed[dIdx] && (
                                    <div className="dest-body" style={{background:'white'}}>

                                        {/* DATES */}
                                        <div style={{padding:'1rem', borderBottom:'1px solid var(--bg)'}}>
                                            <div style={{fontSize:'0.72rem', fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:'0.6rem'}}>📅 Datum</div>
                                            <div className="dates-row">
                                                <div className="date-field">
                                                    <span className="date-label">Ankomst</span>
                                                    <input type="date" className="date-input" value={dest.dateFrom} onChange={e => updateDest(dIdx, 'dateFrom', e.target.value)} />
                                                </div>
                                                <div style={{alignSelf:'flex-end', paddingBottom:'0.6rem', color:'var(--text-muted)', fontSize:'1rem'}}>→</div>
                                                <div className="date-field">
                                                    <span className="date-label">Avresa</span>
                                                    <input type="date" className="date-input" value={dest.dateTo} onChange={e => updateDest(dIdx, 'dateTo', e.target.value)} />
                                                </div>
                                            </div>
                                        </div>

                                        {/* MAP */}
                                        <div style={{padding:'1rem', borderBottom:'1px solid var(--bg)'}}>
                                            <div style={{fontSize:'0.72rem', fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:'0.6rem'}}>🗺 Karta</div>
                                            <div className="map-input-row">
                                                <input
                                                    placeholder={dest.name ? `t.ex. ${dest.name} centrum` : 'Sök plats på kartan...'}
                                                    value={dest.mapQuery}
                                                    onChange={e => updateDest(dIdx, 'mapQuery', e.target.value)}
                                                />
                                                {!dest.mapQuery && dest.name && (
                                                    <button className="btn btn-secondary btn-small" style={{whiteSpace:'nowrap'}} onClick={() => updateDest(dIdx, 'mapQuery', dest.name)}>
                                                        Använd destinationsnamn
                                                    </button>
                                                )}
                                            </div>
                                            {dest.mapQuery && (
                                                <div className="map-iframe-wrap">
                                                    <iframe src={mapEmbedUrl(dest.mapQuery)} allowFullScreen="" loading="lazy" referrerPolicy="no-referrer-when-downgrade" title={`Karta: ${dest.mapQuery}`} />
                                                    <a className="map-open-btn" href={mapDirectUrl(dest.mapQuery)} target="_blank" rel="noreferrer">🗺 Öppna i Google Maps</a>
                                                </div>
                                            )}
                                        </div>

                                        {/* BOENDE */}
                                        <div style={{padding:'1rem', borderBottom:'1px solid var(--bg)'}}>
                                            <div style={{fontSize:'0.72rem', fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:'0.6rem'}}>🏨 Boende</div>
                                            <textarea
                                                className="sight-note-input"
                                                style={{minHeight:'60px', fontSize:'0.88rem'}}
                                                placeholder={'Hotell, Airbnb, adress, bokningsnummer...\nt.ex. Hotel Marina, Bokn: ABC123, Check-in 15:00'}
                                                value={dest.accommodation || ''}
                                                onChange={e => updateDest(dIdx, 'accommodation', e.target.value)}
                                            />
                                        </div>

                                        {/* RESTAURANGER */}
                                        <div style={{padding:'1rem', borderBottom:'1px solid var(--bg)'}}>
                                            <div style={{fontSize:'0.72rem', fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:'0.6rem'}}>🍽️ Restauranger & Mat</div>
                                            <textarea
                                                className="sight-note-input"
                                                style={{minHeight:'60px', fontSize:'0.88rem'}}
                                                placeholder={'Tips på restauranger, lokala specialiteter...\nt.ex. Taverna Kostas (fisk), Marknadsgatan - testa skaldjur'}
                                                value={dest.restaurants || ''}
                                                onChange={e => updateDest(dIdx, 'restaurants', e.target.value)}
                                            />
                                        </div>

                                        {/* ── LEVEL 3: BESÖKSMÅL ── */}
                                        <div style={{padding:'1rem'}}>
                                            <div style={{fontSize:'0.72rem', fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:'0.75rem'}}>
                                                📍 Besöksmål {dest.sights.length > 0 && <span style={{background:'var(--primary)', color:'white', borderRadius:'20px', padding:'0.05rem 0.5rem', fontWeight:700, marginLeft:'0.3rem'}}>{dest.sights.length}</span>}
                                            </div>
                                            <div className="sights-list">
                                                {dest.sights.map((sight, sIdx) => {
                                                    const sightKey = `${dIdx}-${sIdx}`;
                                                    const sightCollapsed = collapsedSights[sightKey] !== false; // default collapsed
                                                    const hasContent = sight.link || sight.mapQuery || sight.note;
                                                    return (
                                                    <div key={sight.id} style={{
                                                        background:'var(--bg)', border:'1.5px solid var(--border)',
                                                        borderRadius:'8px', overflow:'hidden', marginBottom:'0.5rem'
                                                    }}>
                                                        {/* Sight title row — always visible */}
                                                        <div style={{display:'flex', alignItems:'center', gap:'0.5rem', padding:'0.55rem 0.75rem', background:'white', borderBottom: sightCollapsed ? 'none' : '1px solid var(--border)'}}>
                                                            <span style={{
                                                                width:'22px', height:'22px', borderRadius:'50%',
                                                                background:'var(--primary-light)', color:'var(--primary)',
                                                                display:'flex', alignItems:'center', justifyContent:'center',
                                                                fontSize:'0.7rem', fontWeight:700, flexShrink:0
                                                            }}>{sIdx + 1}</span>
                                                            <input
                                                                className="sight-name-input"
                                                                placeholder="Namn på besöksmål..."
                                                                value={sight.name}
                                                                onChange={e => updateSight(dIdx, sIdx, 'name', e.target.value)}
                                                                onClick={e => e.stopPropagation()}
                                                            />
                                                            {/* Indicators */}
                                                            {sightCollapsed && hasContent && (
                                                                <div style={{display:'flex', gap:'0.2rem', flexShrink:0}}>
                                                                    {sight.link && <span style={{fontSize:'0.7rem', opacity:0.5}} title="Har länk">🔗</span>}
                                                                    {sight.mapQuery && <span style={{fontSize:'0.7rem', opacity:0.5}} title="Har karta">🗺</span>}
                                                                    {sight.note && <span style={{fontSize:'0.7rem', opacity:0.5}} title="Har anteckning">📝</span>}
                                                                </div>
                                                            )}
                                                            <button
                                                                onClick={() => toggleSight(dIdx, sIdx)}
                                                                style={{background:'none', border:'none', cursor:'pointer', color:'var(--text-muted)', fontSize:'0.75rem', padding:'0.2rem 0.4rem', borderRadius:'4px', flexShrink:0, fontWeight:600, lineHeight:1}}
                                                                title={sightCollapsed ? 'Expandera' : 'Fäll ihop'}
                                                            >{sightCollapsed ? '▼' : '▲'}</button>
                                                            <button className="sight-del-btn" onClick={() => removeSight(dIdx, sIdx)} title="Ta bort">✕</button>
                                                        </div>
                                                        {/* Sight details — collapsed when sightCollapsed */}
                                                        {!sightCollapsed && (
                                                            <>
                                                            <div style={{padding:'0.6rem 0.75rem', display:'flex', flexDirection:'column', gap:'0.5rem'}}>
                                                                <div style={{display:'flex', gap:'0.5rem', alignItems:'center'}}>
                                                                    <span style={{fontSize:'0.78rem', color:'var(--text-muted)', width:'16px', flexShrink:0}}>🔗</span>
                                                                    <input className="sight-link-input" placeholder="Länk (TripAdvisor, hemsida...)" value={sight.link} onChange={e => updateSight(dIdx, sIdx, 'link', e.target.value)} />
                                                                    {sight.link && <a className="sight-open-btn" href={sight.link.startsWith('http') ? sight.link : 'https://'+sight.link} target="_blank" rel="noreferrer" title="Öppna länk">↗</a>}
                                                                </div>
                                                                <div style={{display:'flex', gap:'0.5rem', alignItems:'center'}}>
                                                                    <span style={{fontSize:'0.78rem', color:'var(--text-muted)', width:'16px', flexShrink:0}}>🗺</span>
                                                                    <input className="sight-link-input" placeholder="Kartsökning (t.ex. Eiffeltornet, Paris)" value={sight.mapQuery || ''} onChange={e => updateSight(dIdx, sIdx, 'mapQuery', e.target.value)} />
                                                                    {!sight.mapQuery && sight.name && (
                                                                        <button style={{fontSize:'0.7rem', fontWeight:600, color:'var(--primary)', border:'1px solid var(--primary-light)', borderRadius:'4px', padding:'0.15rem 0.4rem', background:'none', cursor:'pointer', whiteSpace:'nowrap'}} onClick={() => updateSight(dIdx, sIdx, 'mapQuery', sight.name)}>Använd namn</button>
                                                                    )}
                                                                </div>
                                                                <div style={{display:'flex', gap:'0.5rem', alignItems:'flex-start'}}>
                                                                    <span style={{fontSize:'0.78rem', color:'var(--text-muted)', width:'16px', flexShrink:0, marginTop:'0.3rem'}}>📝</span>
                                                                    <textarea className="sight-note-input" style={{flex:1}} placeholder="Anteckning (öppettider, tips, bokningsnummer...)" value={sight.note} onChange={e => updateSight(dIdx, sIdx, 'note', e.target.value)} />
                                                                </div>
                                                            </div>
                                                            {sight.mapQuery && (
                                                                <div className="map-iframe-wrap" style={{margin:'0 0.75rem 0.75rem'}}>
                                                                    <iframe src={mapEmbedUrl(sight.mapQuery)} allowFullScreen="" loading="lazy" referrerPolicy="no-referrer-when-downgrade" title={`Karta: ${sight.mapQuery}`} />
                                                                    <a className="map-open-btn" href={mapDirectUrl(sight.mapQuery)} target="_blank" rel="noreferrer">🗺 Öppna i Google Maps</a>
                                                                </div>
                                                            )}
                                                            </>
                                                        )}
                                                    </div>
                                                    );
                                                })}
                                                <button className="add-link" onClick={() => addSightExpanded(dIdx)} style={{fontSize:'0.85rem'}}>+ Lägg till besöksmål</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    {/* Bottom danger zone */}
                    <div style={{borderTop:'1px solid var(--border)', paddingTop:'1rem', display:'flex', justifyContent:'flex-start'}}>
                        <button className="btn btn-danger btn-small" style={{fontSize:'0.8rem', opacity:0.7}} onClick={() => setConfirm(true)}>🗑 Ta bort resa</button>
                    </div>
                </div>

                {/* SAVE BAR */}
                <div className="panel-save-bar">
                    <button className="btn btn-secondary" onClick={onClose}>Stäng</button>
                    <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
                        {saving ? 'Sparar...' : '💾 Spara ändringar'}
                    </button>
                </div>
            </div>
        </div>
    );
}

// ── PLANERADE RESOR ───────────────────────────────────────
function PlannedTripsView({ trips, onAddTrip, onDeleteTrip, onActivateTrip, onUpdateTrip, autoEditTrip, onClearAutoEdit, triggerNewModal, onClearTrigger }) {
    const [editingTrip, setEditingTrip] = useState(null);
    const [confirm, setConfirm] = useState(null);
    const [showNewModal, setShowNewModal] = useState(false);
    const [newTripName, setNewTripName] = useState('');
    const [creating, setCreating] = useState(false);

    // Open planner automatically when a new trip is created from another tab
    React.useEffect(() => {
        if (autoEditTrip) {
            setEditingTrip(autoEditTrip);
            onClearAutoEdit();
        }
    }, [autoEditTrip]);

    // Open new modal when triggered from another tab
    React.useEffect(() => {
        if (triggerNewModal) {
            setShowNewModal(true);
            onClearTrigger();
        }
    }, [triggerNewModal]);

    const handleCreateTrip = async () => {
        if (!newTripName.trim() || creating) return;
        setCreating(true);
        const newTrip = await onAddTrip({
            name: newTripName.trim(),
            budget: null,
            plan_data: JSON.stringify([makeDestination()]),
            is_planned: true,
            is_completed: false,
            created_at: new Date().toISOString()
        });
        setCreating(false);
        setShowNewModal(false);
        setNewTripName('');
        if (newTrip) setEditingTrip(newTrip);
    };

    const getTripIcons = ['✈️','🌍','🏝️','🗺️','🚀','⛵','🏔️','🎒'];
    const getTripIcon = (tripId) => {
        const idx = parseInt(String(tripId).replace(/\D/g, '').slice(-1)) % getTripIcons.length;
        return getTripIcons[idx] || '✈️';
    };

    const getDestCount = (trip) => {
        try { const d = JSON.parse(trip.plan_data || '[]'); return d.filter(x => x.name).length; } catch { return 0; }
    };
    const getDateRange = (trip) => {
        try {
            const d = JSON.parse(trip.plan_data || '[]');
            const dates = d.flatMap(x => [x.dateFrom, x.dateTo]).filter(Boolean).sort();
            if (dates.length >= 2) return `${dates[0]} → ${dates[dates.length-1]}`;
        } catch {}
        return null;
    };

    return (
        <div>
            {confirm && (
                <ConfirmDialog
                    title="Ta bort planerad resa?"
                    message={`"${confirm.name}" raderas permanent.`}
                    onConfirm={() => { onDeleteTrip(confirm.id); setConfirm(null); }}
                    onCancel={() => setConfirm(null)}
                />
            )}

            {/* NY RESA MODAL */}
            {showNewModal && (
                <div className="modal-overlay" onClick={() => { setShowNewModal(false); setNewTripName(''); }}>
                    <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:'420px'}}>
                        <div className="modal-header">
                            <span className="modal-title">🗓 Ny resa</span>
                            <button className="close-btn" onClick={() => { setShowNewModal(false); setNewTripName(''); }}>×</button>
                        </div>
                        <div className="form-group">
                            <label className="form-label">Vad ska resan heta?</label>
                            <input
                                className="form-input"
                                placeholder="t.ex. Italien 2026, Thailand med familjen..."
                                value={newTripName}
                                onChange={e => setNewTripName(e.target.value)}
                                onKeyDown={e => { if (e.key === 'Enter') handleCreateTrip(); }}
                                autoFocus
                            />
                        </div>
                        <div style={{display:'flex', gap:'0.75rem'}}>
                            <button className="btn btn-secondary" style={{flex:1}} onClick={() => { setShowNewModal(false); setNewTripName(''); }}>Avbryt</button>
                            <button className="btn btn-primary" style={{flex:1, justifyContent:'center'}} onClick={handleCreateTrip} disabled={!newTripName.trim() || creating}>
                                {creating ? 'Skapar...' : 'Skapa & planera →'}
                            </button>
                        </div>
                    </div>
                </div>
            )}

            {editingTrip && (
                <TripPlannerPanel
                    trip={editingTrip}
                    onSave={async (id, updates) => {
                        await onUpdateTrip(id, updates);
                        setEditingTrip(t => ({ ...t, ...updates }));
                    }}
                    onClose={() => setEditingTrip(null)}
                    onActivate={(id) => { onActivateTrip(id); setEditingTrip(null); }}
                    onDelete={(id) => { onDeleteTrip(id); setEditingTrip(null); }}
                />
            )}

            <div className="trip-cards-grid">
                {trips.map(trip => {
                    const destCount = getDestCount(trip);
                    const dateRange = getDateRange(trip);
                    return (
                        <TripCardShell
                            key={trip.id}
                            trip={trip}
                            badge={{ label:'🗓 Planerad', cls:'tc-badge-planned' }}
                            selected={false}
                            onClick={null}
                        >
                            <div className="tc-bottom">
                                <div className="tc-name">{trip.name}</div>
                                <div className="tc-meta">
                                    {destCount > 0 && `${destCount} ${destCount === 1 ? 'destination' : 'destinationer'}`}
                                    {dateRange && ` · 📅 ${dateRange}`}
                                    {trip.budget && trip.budget > 0 && ` · 💰 ${Number(trip.budget).toFixed(0)} kr`}
                                </div>
                                <div className="tc-actions">
                                    <button className="btn btn-primary btn-small" style={{width:'100%', justifyContent:'center', fontSize:'0.85rem'}} onClick={() => onActivateTrip(trip.id)}>▶ Starta resa</button>
                                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0.35rem'}}>
                                        <button className="btn btn-secondary btn-small" style={{justifyContent:'center', fontSize:'0.82rem'}} onClick={() => setEditingTrip(trip)}>✏️ Planera</button>
                                        <button className="btn btn-danger btn-small" style={{justifyContent:'center', fontSize:'0.82rem'}} onClick={() => setConfirm({ id: trip.id, name: trip.name })}>🗑 Ta bort</button>
                                    </div>
                                </div>
                            </div>
                        </TripCardShell>
                    );
                })}

                <div className="trip-card trip-card-new" onClick={() => setShowNewModal(true)}>
                    <span className="plus-icon">+</span>
                    <span>Planera resa</span>
                </div>
            </div>

            {trips.length === 0 && (
                <div className="placeholder-box" style={{marginTop:'0'}}>
                    <div className="placeholder-icon">🗓️</div>
                    <div className="placeholder-title">Inga planerade resor</div>
                    <div className="placeholder-desc">Klicka på "Planera resa" för att lägga till en kommande resa med destinationer, datum och besöksmål.</div>
                </div>
            )}
        </div>
    );
}

// ── AVSLUTADE RESOR ───────────────────────────────────────
function CompletedTripsView({ trips, allExpenses, users, currentUser, categories, onDeleteTrip, onAddExpense, onDeleteExpense, onUpdateExpense }) {
    const [confirm, setConfirm] = useState(null);
    const [expandedTrip, setExpandedTrip] = useState(null);
    const [expenseView, setExpenseView] = useState('list');
    const [summaryTrip, setSummaryTrip] = useState(null);
    const [exportTrip, setExportTrip] = useState(null);
    const [editingExpense, setEditingExpense] = useState(null);

    // Listen for export events from TripSummaryModal
    React.useEffect(() => {
        const handler = (e) => setExportTrip(e.detail);
        window.addEventListener('openExport', handler);
        return () => window.removeEventListener('openExport', handler);
    }, []);

    // Add-expense form state per expanded trip
    const [description, setDescription] = useState('');
    const [amount, setAmount] = useState('');
    const [currency, setCurrency] = useState('SEK');
    const [category, setCategory] = useState('food');
    const [expenseDate, setExpenseDate] = useState(new Date().toISOString().split('T')[0]);
    const [submitting, setSubmitting] = useState(false);

    const getCatInfo = (id) => categories.find(c => c.id === id) || { icon: '📌', name: id };
    const getUserName = (uid) => users.find(u => u.id === uid)?.name || 'Okänd';
    const { getCurrencies } = useLiveRates();
    const CURRENCIES = getCurrencies();

    const handleSaveEdit = async () => {
        if (!editingExpense || !onUpdateExpense) return;
        const sel = CURRENCIES.find(c => c.code === editingExpense.currency);
        await onUpdateExpense(editingExpense.id, {
            description: editingExpense.description,
            amount: parseFloat(editingExpense.amount),
            currency: editingExpense.currency,
            exchange_rate: sel ? sel.rate : editingExpense.exchange_rate,
            category: editingExpense.category,
            date: new Date(editingExpense.date).toISOString(),
            note: editingExpense.note || ''
        });
        setEditingExpense(null);
    };

    const getTripTotal = (tripId) =>
        allExpenses.filter(e => e.trip_id === tripId).reduce((sum, e) => sum + e.amount * e.exchange_rate, 0);

    const getTripIcons = ['✈️','🌍','🏝️','🗺️','🚀','⛵','🏔️','🎒'];
    const getTripIcon = (tripId) => {
        const idx = parseInt(String(tripId).replace(/\D/g, '').slice(-1)) % getTripIcons.length;
        return getTripIcons[idx] || '✈️';
    };

    const handleAddExpense = async (e, tripId) => {
        e.preventDefault();
        if (!description || !amount || submitting) return;
        setSubmitting(true);
        const sel = CURRENCIES.find(c => c.code === currency);
        await onAddExpense({ description, amount: parseFloat(amount), currency, exchange_rate: sel.rate, category, date: new Date(expenseDate).toISOString() }, tripId);
        setDescription(''); setAmount(''); setCategory('food');
        setExpenseDate(new Date().toISOString().split('T')[0]);
        setSubmitting(false);
    };

    if (trips.length === 0) {
        return (
            <div className="placeholder-box">
                <div className="placeholder-icon">📂</div>
                <div className="placeholder-title">Inga avslutade resor</div>
                <div className="placeholder-desc">Resor du avslutar från Pågående Resa-fliken dyker upp här.</div>
            </div>
        );
    }

    return (
        <div>
            {confirm && (
                <ConfirmDialog
                    title={confirm.type === 'trip' ? 'Ta bort avslutad resa?' : 'Ta bort utgift?'}
                    message={confirm.type === 'trip'
                        ? `"${confirm.name}" och alla dess utgifter raderas permanent.`
                        : `"${confirm.name}" raderas permanent.`}
                    onConfirm={() => {
                        if (confirm.type === 'trip') onDeleteTrip(confirm.id);
                        else onDeleteExpense(confirm.id);
                        setConfirm(null);
                    }}
                    onCancel={() => setConfirm(null)}
                />
            )}

            {summaryTrip && (
                <TripSummaryModal
                    trip={summaryTrip}
                    expenses={allExpenses.filter(e => e.trip_id === summaryTrip.id)}
                    categories={categories}
                    users={users}
                    onClose={() => setSummaryTrip(null)}
                />
            )}

            {exportTrip && (
                <TripExportModal
                    trip={exportTrip.trip}
                    expenses={exportTrip.expenses}
                    categories={exportTrip.categories}
                    users={exportTrip.users}
                    onClose={() => setExportTrip(null)}
                />
            )}

            {/* REDIGERA UTGIFT MODAL */}
            {editingExpense && (
                <div className="modal-overlay" onClick={() => setEditingExpense(null)}>
                    <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:'480px'}}>
                        <div className="modal-header">
                            <span className="modal-title">✏️ Redigera utgift</span>
                            <button className="close-btn" onClick={() => setEditingExpense(null)}>×</button>
                        </div>
                        <div style={{display:'flex', flexDirection:'column', gap:'0.75rem'}}>
                            <div className="form-group" style={{marginBottom:0}}>
                                <label className="form-label">Beskrivning</label>
                                <input className="form-input" value={editingExpense.description}
                                    onChange={e => setEditingExpense({...editingExpense, description: e.target.value})} />
                            </div>
                            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0.75rem'}}>
                                <div className="form-group" style={{marginBottom:0}}>
                                    <label className="form-label">Belopp</label>
                                    <input type="number" step="0.01" className="form-input" value={editingExpense.amount}
                                        onChange={e => setEditingExpense({...editingExpense, amount: e.target.value})} />
                                </div>
                                <div className="form-group" style={{marginBottom:0}}>
                                    <label className="form-label">Valuta</label>
                                    <select className="form-select" value={editingExpense.currency}
                                        onChange={e => setEditingExpense({...editingExpense, currency: e.target.value})}>
                                        {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div className="form-group" style={{marginBottom:0}}>
                                <label className="form-label">Kategori</label>
                                <select className="form-select" value={editingExpense.category}
                                    onChange={e => setEditingExpense({...editingExpense, category: e.target.value})}>
                                    {categories.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
                                </select>
                            </div>
                            <div className="form-group" style={{marginBottom:0}}>
                                <label className="form-label">Datum</label>
                                <input type="date" className="form-input" value={editingExpense.date ? editingExpense.date.split('T')[0] : ''}
                                    onChange={e => setEditingExpense({...editingExpense, date: e.target.value})} />
                            </div>
                            <div className="form-group" style={{marginBottom:0}}>
                                <label className="form-label">Anteckning</label>
                                <input className="form-input" placeholder="Valfritt..." value={editingExpense.note || ''}
                                    onChange={e => setEditingExpense({...editingExpense, note: e.target.value})} />
                            </div>
                            <div style={{display:'flex', gap:'0.75rem', marginTop:'0.25rem'}}>
                                <button className="btn btn-secondary" style={{flex:1}} onClick={() => setEditingExpense(null)}>Avbryt</button>
                                <button className="btn btn-primary" style={{flex:1, justifyContent:'center'}} onClick={handleSaveEdit}>💾 Spara</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            <div className="trip-cards-grid" style={{marginBottom:'2rem'}}>
                {trips.map(trip => {
                    const count = allExpenses.filter(e => e.trip_id === trip.id).length;
                    const total = getTripTotal(trip.id);
                    const hasBudget = trip.budget && trip.budget > 0;
                    const underBudget = hasBudget && total <= trip.budget;
                    return (
                        <TripCardShell
                            key={trip.id}
                            trip={trip}
                            badge={{ label:'✓ Avslutad', cls:'tc-badge-done' }}
                            selected={false}
                            onClick={null}
                        >
                            <div className="tc-bottom">
                                <div className="tc-name">{trip.name}</div>
                                <div className="tc-meta">
                                    {count} {count === 1 ? 'utgift' : 'utgifter'}
                                    {hasBudget ? ` · Budget: ${trip.budget.toFixed(0)} kr` : ''}
                                </div>
                                {hasBudget && (() => {
                                    const pct = Math.min(100, (total / trip.budget) * 100);
                                    const color = pct > 100 ? '#f44336' : '#4caf50';
                                    return (
                                        <div className="tc-budget-bar">
                                            <div className="tc-budget-fill" style={{width:`${Math.min(100,pct)}%`, background:color}} />
                                        </div>
                                    );
                                })()}
                                {hasBudget && (
                                    <div style={{fontSize:'0.75rem', color: underBudget ? '#a5d6a7' : '#ef9a9a', fontWeight:600, marginBottom:'0.4rem'}}>
                                        {underBudget ? `✓ Sparade ${(trip.budget - total).toFixed(0)} kr` : `⚠ Överskred med ${(total - trip.budget).toFixed(0)} kr`}
                                    </div>
                                )}
                                <div className="tc-total">{total > 0 ? `${total.toFixed(0)} kr` : '–'}</div>
                                <div className="tc-actions">
                                    <button
                                        className="btn btn-primary btn-small"
                                        style={{width:'100%', justifyContent:'center', fontSize:'0.82rem'}}
                                        onClick={() => setSummaryTrip(trip)}
                                    >📊 Sammanfattning</button>
                                    <div style={{display:'flex', gap:'0.35rem'}}>
                                        <button
                                            className="btn btn-secondary btn-small"
                                            style={{flex:1, justifyContent:'center', fontSize:'0.78rem'}}
                                            onClick={() => { setExpandedTrip(expandedTrip === trip.id ? null : trip.id); setExpenseView('list'); }}
                                        >{expandedTrip === trip.id ? '▲ Dölj' : '📋 Visa utgifter'}</button>
                                        <button className="trip-card-del" onClick={() => setConfirm({ type:'trip', id: trip.id, name: trip.name })}>🗑</button>
                                    </div>
                                </div>
                            </div>
                        </TripCardShell>
                    );
                })}
            </div>

            {/* EXPANDED EXPENSE PANEL */}
            {expandedTrip && (() => {
                const trip = trips.find(t => t.id === expandedTrip);
                if (!trip) return null;
                const tripExpenses = allExpenses.filter(e => e.trip_id === expandedTrip).sort((a,b) => new Date(b.date) - new Date(a.date));

                return (
                    <div className="card" style={{marginBottom:'2rem'}}>
                        <div className="card-header">
                            <h3 className="card-title">{trip.name} — utgifter</h3>
                            <div style={{display:'flex', gap:'0.5rem', alignItems:'center'}}>
                                <button className="btn btn-secondary btn-small" style={{fontSize:'0.8rem'}} onClick={() => setExportTrip({ trip, expenses: tripExpenses, categories, users })}>📤 Exportera</button>
                                <div className="view-toggle">
                                    <span className="view-toggle-label">Visa:</span>
                                    <button className={`toggle-btn ${expenseView==='list'?'active':''}`} onClick={() => setExpenseView('list')}>Lista</button>
                                    <button className={`toggle-btn ${expenseView==='day'?'active':''}`} onClick={() => setExpenseView('day')}>Per dag</button>
                                </div>
                            </div>
                        </div>

                        {/* Lägg till utgift */}
                        <form onSubmit={e => handleAddExpense(e, expandedTrip)} style={{background:'var(--primary)', borderRadius:'10px', padding:'1.25rem', marginBottom:'1.5rem', color:'white'}}>
                            <div style={{fontWeight:600, marginBottom:'0.75rem', fontSize:'0.95rem'}}>⚡ Lägg till utgift</div>
                            <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr auto', gap:'0.75rem', alignItems:'end'}}>
                                <input type="text" className="form-input" placeholder="Vad?" value={description} onChange={e => setDescription(e.target.value)} required disabled={submitting} style={{background:'rgba(255,255,255,0.95)'}} />
                                <input type="number" step="0.01" className="form-input" placeholder="Belopp" value={amount} onChange={e => setAmount(e.target.value)} required disabled={submitting} style={{background:'rgba(255,255,255,0.95)'}} />
                                <select className="form-select" value={currency} onChange={e => setCurrency(e.target.value)} disabled={submitting} style={{background:'rgba(255,255,255,0.95)'}}>
                                    {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code}</option>)}
                                </select>
                                <select className="form-select" value={category} onChange={e => setCategory(e.target.value)} disabled={submitting} style={{background:'rgba(255,255,255,0.95)'}}>
                                    {categories.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
                                </select>
                                <input type="date" className="form-input" value={expenseDate} onChange={e => setExpenseDate(e.target.value)} disabled={submitting} required style={{background:'rgba(255,255,255,0.95)'}} />
                                <button type="submit" className="btn btn-secondary" disabled={submitting}>{submitting ? '...' : 'Lägg till'}</button>
                            </div>
                        </form>

                        {/* Expense list or day view */}
                        {tripExpenses.length === 0 ? (
                            <p style={{textAlign:'center', color:'var(--text-muted)', padding:'2rem'}}>Inga utgifter för denna resa</p>
                        ) : expenseView === 'list' ? (
                            <div className="expense-list">
                                {tripExpenses.map(expense => {
                                    const cat = getCatInfo(expense.category);
                                    return (
                                        <div key={expense.id} className="expense-item">
                                            <div className="expense-category">{cat.icon}</div>
                                            <div className="expense-details">
                                                <div className="expense-description">{expense.description}</div>
                                                <div className="expense-meta">{cat.name} · {getUserName(expense.added_by)} · {new Date(expense.date).toLocaleDateString('sv-SE')}</div>
                                            </div>
                                            <div className="expense-amount">
                                                <div className="expense-price">{(expense.amount * expense.exchange_rate).toFixed(0)} kr</div>
                                                <div className="expense-currency">({expense.amount.toFixed(0)} {expense.currency})</div>
                                            </div>
                                            <div style={{display:'flex', gap:'0.3rem'}}>
                                                <button className="btn btn-secondary btn-icon btn-small" title="Redigera utgift"
                                                    onClick={() => setEditingExpense({...expense, date: expense.date ? expense.date.split('T')[0] : ''})}>✏️</button>
                                                <button className="btn btn-danger btn-icon btn-small" title="Ta bort utgift"
                                                    onClick={() => setConfirm({ type:'expense', id: expense.id, name: expense.description })}>🗑</button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        ) : (
                            <DayBreakdown expenses={tripExpenses} categories={categories} users={users} />
                        )}
                    </div>
                );
            })()}
        </div>
    );
}

// ── INLOGGNING ────────────────────────────────────────────
function LoginForm({ onLogin }) {
    const [username, setUsername] = useState('');
    const [password, setPassword] = useState('');
    const [error, setError] = useState('');
    const [loading, setLoading] = useState(false);

    const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true); setError('');
        try {
            const { data, error } = await supabase.from('users').select('*').eq('username', username).eq('password', password).single();
            if (error || !data) setError('Fel användarnamn eller lösenord');
            else onLogin(data);
        } catch (err) { setError('Fel vid inloggning: ' + err.message); }
        setLoading(false);
    };

    return (
        <div className="login-container">
            <h1 className="login-title">✈️ Våra resor</h1>
            {error && <div className="alert alert-error">{error}</div>}
            <form onSubmit={handleSubmit}>
                <div className="form-group">
                    <label className="form-label">Användarnamn</label>
                    <input type="text" className="form-input" value={username} onChange={e => setUsername(e.target.value)} required disabled={loading} />
                </div>
                <div className="form-group">
                    <label className="form-label">Lösenord</label>
                    <input type="password" className="form-input" value={password} onChange={e => setPassword(e.target.value)} required disabled={loading} />
                </div>
                <button type="submit" className="btn btn-primary" style={{width:'100%'}} disabled={loading}>
                    {loading ? 'Loggar in...' : 'Logga in'}
                </button>
            </form>
        </div>
    );
}
